name: Deploy CSV Presentation App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: VPS

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "❌ VPS_HOST is empty"
            exit 1
          fi

          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "❌ VPS_SSH_KEY is empty"
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/github-actions

          if [ ! -s ~/.ssh/github-actions ]; then
            echo "❌ SSH key file is empty"
            exit 1
          fi

          chmod 600 ~/.ssh/github-actions
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

          echo "✅ SSH setup complete"

      - name: Deploy dist
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/github-actions -o IdentitiesOnly=yes" \
            dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/deploy/shacky-apps/csv-presentation-app/dist

      - name: Restart PM2
        run: |
          ssh -i ~/.ssh/github-actions -o IdentitiesOnly=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
              cd /home/deploy/shacky-apps/csv-presentation-app
              pm2 restart csv-presentation-app || pm2 start ecosystem.config.js
              pm2 save
            'EOF'