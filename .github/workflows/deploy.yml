name: Deploy CSV Presentation App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/github-actions
          chmod 600 ~/.ssh/github-actions
          ssh-keyscan ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy dist
        run: |
          rsync -avz --delete dist/ \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/deploy/shacky-apps/csv-presentation-app/dist

      - name: Restart PM2
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd /home/deploy/shacky-apps/csv-presentation-app
            pm2 restart csv-presentation-app || pm2 start ecosystem.config.js
            pm2 save
          EOF
